    <!--
      SPA fallback for GitHub Pages: restore the real path after the 404.html
      redirect (rafgraph / spa-github-pages, MIT). Must run before the app.
    -->
    <script>
      (function () {
        var l = window.location
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })()
    </script>
