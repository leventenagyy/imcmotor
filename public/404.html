<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <title>IMC Motor</title>
    <script>
      // SPA fallback for GitHub Pages (rafgraph / spa-github-pages, MIT).
      // Redirects deep links to index.html, which restores the real path.
      // pathSegmentsToKeep = 1 for PROJECT pages (user.github.io/<repo>/).
      // Set to 0 for a custom domain (imcmotor.hu) or a user/org root site.
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
