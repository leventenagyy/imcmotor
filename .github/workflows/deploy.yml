name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci): the lockfile may omit platform-specific optional
      # native deps when generated on a different OS; install reconciles them.
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
        # Project pages live at user.github.io/<repo>/ → set base accordingly.
        # For a custom domain (imcmotor.hu) remove this env (base becomes '/')
        # and add a public/CNAME file + set 404.html pathSegmentsToKeep = 0.
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
